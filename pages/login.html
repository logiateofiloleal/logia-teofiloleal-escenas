<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon-logo.svg">
  <title>Acceso Admin — Logia Teófilo Leal N° 115</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/main.css">
</head>

<body class="bio-page">

  <div class="pnl-login-wrap">
    <div class="pnl-login-card">

      <!-- Logo -->
      <img
        class="pnl-login-logo"
        src="../assets/img/logo.png"
        alt="Logo Logia Teófilo Leal N° 115"
      >

      <!-- Título -->
      <h1 class="pnl-login-title">Acceso restringido</h1>
      <p class="pnl-login-sub">Panel administrativo · Logia N° 115</p>

      <!-- Formulario -->
      <form id="form-login" class="pnl-login-form" autocomplete="off">

        <div class="asp-field">
          <label class="asp-label" for="usuario">Usuario</label>
          <input
            class="asp-input"
            type="text"
            id="usuario"
            name="usuario"
            placeholder="Nombre de usuario"
            required
            autocomplete="username"
          >
        </div>

        <div class="asp-field">
          <label class="asp-label" for="password">Contraseña</label>
          <input
            class="asp-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
        </div>

        <!-- Mensaje de estado -->
        <div id="login-mensaje" class="asp-msg" role="alert" aria-live="assertive"></div>

        <button type="submit" id="login-submit" class="asp-submit">
          Entrar
        </button>

      </form>

    </div>
  </div>


  <script>
    (function () {
      // Si ya hay sesión activa, ir directamente al panel
      if (sessionStorage.getItem('adminToken')) {
        window.location.replace('panel-aspirantes.html');
        return;
      }

      const formulario  = document.getElementById('form-login');
      const mensajeDiv  = document.getElementById('login-mensaje');
      const btnEntrar   = document.getElementById('login-submit');

      function mostrarMensaje(texto, tipo) {
        mensajeDiv.textContent = texto;
        mensajeDiv.className   = 'asp-msg visible ' + tipo;
      }

      function ocultarMensaje() {
        mensajeDiv.className = 'asp-msg';
      }

      formulario.addEventListener('submit', async function (e) {
        e.preventDefault();
        ocultarMensaje();

        const usuario  = document.getElementById('usuario').value.trim();
        const password = document.getElementById('password').value;

        btnEntrar.disabled    = true;
        btnEntrar.textContent = 'Verificando…';

        try {
          const res = await fetch('/api/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ usuario, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            mostrarMensaje(data.message || 'Credenciales incorrectas.', 'error');
            return;
          }

          sessionStorage.setItem('adminToken', data.token);
          window.location.href = 'panel-aspirantes.html';

        } catch (_) {
          mostrarMensaje('Error de conexión. Verifica que el servidor esté activo.', 'error');
        } finally {
          btnEntrar.disabled    = false;
          btnEntrar.textContent = 'Entrar';
        }
      });
    })();
  </script>

</body>
</html>
