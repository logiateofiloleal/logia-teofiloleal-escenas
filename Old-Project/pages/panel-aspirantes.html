<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon-logo.svg">
  <title>Panel de Aspirantes — Logia Teófilo Leal N° 115</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/main.css">
</head>

<body class="bio-page">

  <!-- ════════════════════════════════════════════════════
       CABECERA
  ════════════════════════════════════════════════════ -->
  <header class="pnl-header">
    <div class="pnl-header-inner">

      <div class="pnl-header-brand">
        <img
          class="pnl-header-logo"
          src="../assets/img/logo.png"
          alt="Logo Logia Teófilo Leal N° 115"
        >
        <span class="pnl-header-name">Logia Teófilo Leal N° 115</span>
        <span class="pnl-header-tag">Admin</span>
      </div>

      <button id="btn-salir" class="pnl-btn-salir" aria-label="Cerrar sesión">
        Cerrar sesión
      </button>

    </div>
  </header>


  <!-- ════════════════════════════════════════════════════
       CUERPO
  ════════════════════════════════════════════════════ -->
  <main class="pnl-body">

    <h1 class="pnl-page-title">Solicitudes de aspirantes</h1>
    <p class="pnl-page-sub" id="pnl-sub">Cargando…</p>

    <!-- Estadísticas -->
    <div class="pnl-stats" id="pnl-stats" aria-label="Resumen de solicitudes">
      <div class="pnl-stat"><span class="pnl-stat-num" id="stat-total">—</span><span class="pnl-stat-label">Total</span></div>
      <div class="pnl-stat"><span class="pnl-stat-num" id="stat-nuevo">—</span><span class="pnl-stat-label">Nuevos</span></div>
      <div class="pnl-stat"><span class="pnl-stat-num" id="stat-proceso">—</span><span class="pnl-stat-label">En proceso</span></div>
      <div class="pnl-stat"><span class="pnl-stat-num" id="stat-aprobado">—</span><span class="pnl-stat-label">Aprobados</span></div>
      <div class="pnl-stat"><span class="pnl-stat-num" id="stat-rechazado">—</span><span class="pnl-stat-label">Rechazados</span></div>
    </div>

    <!-- Tabla -->
    <div class="pnl-table-wrap" id="pnl-tabla-wrap"></div>

  </main>


  <!-- ════════════════════════════════════════════════════
       MODAL — Historial
  ════════════════════════════════════════════════════ -->
  <div id="modal-historial" class="pnl-modal" role="dialog" aria-modal="true" aria-labelledby="hist-titulo">
    <div class="pnl-modal-card">
      <button class="pnl-modal-cerrar" id="cerrar-historial" aria-label="Cerrar">✕</button>
      <h2 class="pnl-modal-title" id="hist-titulo">Historial</h2>
      <div id="hist-contenido"></div>
    </div>
  </div>


  <!-- ════════════════════════════════════════════════════
       MODAL — Confirmar eliminación
  ════════════════════════════════════════════════════ -->
  <div id="modal-eliminar" class="pnl-modal" role="dialog" aria-modal="true" aria-labelledby="elim-titulo">
    <div class="pnl-modal-card">
      <button class="pnl-modal-cerrar" id="cerrar-eliminar" aria-label="Cerrar">✕</button>
      <h2 class="pnl-modal-title" id="elim-titulo">Confirmar eliminación</h2>
      <p class="pnl-modal-aviso" id="elim-texto"></p>
      <div class="pnl-modal-acciones">
        <button class="pnl-btn pnl-btn--cancelar" id="elim-cancelar">Cancelar</button>
        <button class="pnl-btn pnl-btn--confirmar" id="elim-confirmar">Sí, eliminar</button>
      </div>
    </div>
  </div>


  <script>
    (function () {
      'use strict';

      /* ── Auth ─────────────────────────────────────────── */
      const token = sessionStorage.getItem('adminToken');
      if (!token) {
        window.location.replace('login.html');
        return;
      }

      const authHeaders = {
        'Content-Type':  'application/json',
        'Authorization': 'Bearer ' + token,
      };

      /* ── Estado ───────────────────────────────────────── */
      let aspirantes      = [];
      let idAEliminar     = null;

      const ordenEstados = {
        'Nuevo': 1, 'Contactado': 2, 'En proceso': 3,
        'Aprobado': 4, 'Rechazado': 5,
      };

      const classBadge = {
        'Nuevo':      'pnl-badge--nuevo',
        'Contactado': 'pnl-badge--contactado',
        'En proceso': 'pnl-badge--proceso',
        'Aprobado':   'pnl-badge--aprobado',
        'Rechazado':  'pnl-badge--rechazado',
      };

      /* ── DOM refs ─────────────────────────────────────── */
      const subEl       = document.getElementById('pnl-sub');
      const tablaWrap   = document.getElementById('pnl-tabla-wrap');
      const modalHist   = document.getElementById('modal-historial');
      const histTitulo  = document.getElementById('hist-titulo');
      const histConten  = document.getElementById('hist-contenido');
      const modalElim   = document.getElementById('modal-eliminar');
      const elimTexto   = document.getElementById('elim-texto');

      /* ── Cargar aspirantes ────────────────────────────── */
      async function cargar() {
        try {
          const res = await fetch('/api/aspirantes', { headers: authHeaders });

          if (res.status === 401) {
            sessionStorage.removeItem('adminToken');
            window.location.replace('login.html');
            return;
          }

          aspirantes = await res.json();
          renderizar();
        } catch (_) {
          tablaWrap.innerHTML = '<p class="pnl-empty">Error al cargar los datos. Recarga la página.</p>';
        }
      }

      /* ── Renderizar tabla y estadísticas ──────────────── */
      function renderizar() {
        actualizarStats();

        if (aspirantes.length === 0) {
          subEl.textContent = 'No hay solicitudes registradas aún.';
          tablaWrap.innerHTML = '<p class="pnl-empty">Ninguna solicitud recibida todavía.</p>';
          return;
        }

        subEl.textContent = 'Solicitudes recibidas desde el formulario público.';

        const ordenados = [...aspirantes].sort((a, b) =>
          (ordenEstados[a.estado || 'Nuevo'] || 99) - (ordenEstados[b.estado || 'Nuevo'] || 99)
        );

        const filas = ordenados.map((a, i) => {
          const estado  = a.estado || 'Nuevo';
          const badge   = classBadge[estado] || 'pnl-badge--nuevo';
          const fecha   = new Date(a.timestamp).toLocaleDateString('es-VE', {
            day: '2-digit', month: 'short', year: 'numeric',
          });

          const opciones = ['Nuevo','Contactado','En proceso','Aprobado','Rechazado']
            .map(op => `<option value="${op}"${op === estado ? ' selected' : ''}>${op}</option>`)
            .join('');

          return `
            <tr>
              <td>${i + 1}</td>
              <td>${esc(a.nombre)}</td>
              <td>${esc(String(a.edad))}</td>
              <td>${esc(a.telefono)}</td>
              <td>${esc(a.email)}</td>
              <td>${fecha}</td>
              <td><span class="pnl-badge ${badge}">${estado}</span></td>
              <td>
                <select class="pnl-select" data-id="${a.id}" aria-label="Cambiar estado de ${esc(a.nombre)}">
                  ${opciones}
                </select>
              </td>
              <td>
                <button class="pnl-btn pnl-btn--historial" data-hist="${a.id}">Historial</button>
              </td>
              <td>
                <button class="pnl-btn pnl-btn--eliminar" data-del="${a.id}" data-nombre="${esc(a.nombre)}">Eliminar</button>
              </td>
            </tr>`;
        }).join('');

        tablaWrap.innerHTML = `
          <table class="pnl-table">
            <thead>
              <tr>
                <th>#</th><th>Nombre</th><th>Edad</th><th>Teléfono</th>
                <th>Email</th><th>Fecha</th><th>Estado</th>
                <th>Cambiar estado</th><th>Historial</th><th>Acción</th>
              </tr>
            </thead>
            <tbody>${filas}</tbody>
          </table>`;

        tablaWrap.querySelectorAll('.pnl-select').forEach(sel => {
          sel.addEventListener('change', function () {
            actualizarEstado(Number(this.dataset.id), this.value);
          });
        });

        tablaWrap.querySelectorAll('[data-hist]').forEach(btn => {
          btn.addEventListener('click', function () {
            verHistorial(Number(this.dataset.hist));
          });
        });

        tablaWrap.querySelectorAll('[data-del]').forEach(btn => {
          btn.addEventListener('click', function () {
            abrirModalEliminar(Number(this.dataset.del), this.dataset.nombre);
          });
        });
      }

      function actualizarStats() {
        const total     = aspirantes.length;
        const nuevo     = aspirantes.filter(a => (a.estado || 'Nuevo') === 'Nuevo').length;
        const proceso   = aspirantes.filter(a => a.estado === 'En proceso').length;
        const aprobado  = aspirantes.filter(a => a.estado === 'Aprobado').length;
        const rechazado = aspirantes.filter(a => a.estado === 'Rechazado').length;

        document.getElementById('stat-total').textContent    = total;
        document.getElementById('stat-nuevo').textContent    = nuevo;
        document.getElementById('stat-proceso').textContent  = proceso;
        document.getElementById('stat-aprobado').textContent = aprobado;
        document.getElementById('stat-rechazado').textContent= rechazado;
      }

      /* ── Cambiar estado ───────────────────────────────── */
      async function actualizarEstado(id, estado) {
        try {
          const res = await fetch(`/api/aspirantes/${id}/estado`, {
            method:  'PUT',
            headers: authHeaders,
            body:    JSON.stringify({ estado }),
          });
          if (!res.ok) return;
          const a = aspirantes.find(x => x.id === id);
          if (a) {
            a.estado = estado;
            if (!a.historialEstados) a.historialEstados = [];
            a.historialEstados.push({ estado, fecha: new Date().toISOString(), nota: 'Estado actualizado desde el panel' });
          }
          renderizar();
        } catch (_) {}
      }

      /* ── Historial ────────────────────────────────────── */
      function verHistorial(id) {
        const a = aspirantes.find(x => x.id === id);
        if (!a) return;

        histTitulo.textContent = 'Historial · ' + a.nombre;

        const items = (a.historialEstados || []).map(h => `
          <div class="pnl-historial-item">
            <span class="pnl-historial-estado">${esc(h.estado)}</span>
            <span class="pnl-historial-fecha">${new Date(h.fecha).toLocaleString('es-VE')}</span>
          </div>`).join('') || '<p style="color:rgba(200,180,150,.4);font-family:var(--sans);font-size:12px;">Sin historial.</p>';

        histConten.innerHTML = items;
        modalHist.classList.add('abierto');
      }

      /* ── Eliminar ─────────────────────────────────────── */
      function abrirModalEliminar(id, nombre) {
        idAEliminar = id;
        elimTexto.textContent = `¿Eliminar a ${nombre}? Esta acción no se puede deshacer.`;
        modalElim.classList.add('abierto');
      }

      async function confirmarEliminar() {
        if (!idAEliminar) return;
        try {
          const res = await fetch(`/api/aspirantes/${idAEliminar}`, {
            method: 'DELETE', headers: authHeaders,
          });
          if (res.ok) {
            aspirantes = aspirantes.filter(a => a.id !== idAEliminar);
            renderizar();
          }
        } catch (_) {}
        cerrarModalEliminar();
      }

      /* ── Logout ───────────────────────────────────────── */
      async function cerrarSesion() {
        try {
          await fetch('/api/logout', { method: 'POST', headers: authHeaders });
        } catch (_) {}
        sessionStorage.removeItem('adminToken');
        window.location.replace('login.html');
      }

      /* ── Cerrar modales ───────────────────────────────── */
      function cerrarModalHistorial() { modalHist.classList.remove('abierto'); }
      function cerrarModalEliminar()  { modalElim.classList.remove('abierto'); idAEliminar = null; }

      /* ── Escape de HTML ───────────────────────────────── */
      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      /* ── Eventos ──────────────────────────────────────── */
      document.getElementById('btn-salir').addEventListener('click', cerrarSesion);
      document.getElementById('cerrar-historial').addEventListener('click', cerrarModalHistorial);
      document.getElementById('cerrar-eliminar').addEventListener('click', cerrarModalEliminar);
      document.getElementById('elim-cancelar').addEventListener('click', cerrarModalEliminar);
      document.getElementById('elim-confirmar').addEventListener('click', confirmarEliminar);

      // Clic en fondo del modal lo cierra
      modalHist.addEventListener('click', function (e) { if (e.target === modalHist) cerrarModalHistorial(); });
      modalElim.addEventListener('click', function (e) { if (e.target === modalElim) cerrarModalEliminar(); });

      // Esc cierra cualquier modal abierto
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { cerrarModalHistorial(); cerrarModalEliminar(); }
      });

      /* ── Init ─────────────────────────────────────────── */
      cargar();
    })();
  </script>

</body>
</html>
